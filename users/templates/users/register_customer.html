{% extends 'main/base.html' %}
{% block title %}Customer Sign Up{% endblock %}

{% block content %}
  <div class="form-card">
    <h1 class="page-title">🙋 Register as a Customer</h1>
    <p class="page-subtitle">Create your account and start booking trusted home services.</p>
    <form method="POST" novalidate>
      {% csrf_token %}
      {% include 'main/_form_fields.html' %}
      <button type="submit" name="register" class="btn btn-primary btn-lg btn-block">Create Account</button>
    </form>
    <p class="page-subtitle">Already have an account? <a href="{% url 'login_user' %}">Log in</a></p>
  </div>
{% endblock %}
